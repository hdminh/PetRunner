name: Windows Release

on:
  workflow_dispatch:
  push:
    paths:
      - "windows/**"
      - "script/package_windows.ps1"
      - ".github/workflows/windows-release.yml"

permissions:
  contents: read

jobs:
  build-windows-x64:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Test and publish
        shell: pwsh
        run: ./script/package_windows.ps1
      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: PetRunner-Windows
          path: |
            dist/win-x64/PetRunner.exe
            dist/win-x64/PetRunner.exe.sha256
            dist/win-arm64/PetRunner.exe
            dist/win-arm64/PetRunner.exe.sha256
          if-no-files-found: error
