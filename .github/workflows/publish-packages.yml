name: Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_npm:
        description: Publish to npm (requires the configured trusted publisher)
        required: true
        default: false
        type: boolean
      publish_github:
        description: Publish to GitHub Packages
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm test
      - run: npm pack --dry-run
      - name: Check release tag version
        if: github.event_name == 'release'
        run: |
          test "v$(node -p "require('./package.json').version")" = "${{ github.event.release.tag_name }}"

  publish-npm:
    needs: verify
    if: github.event_name == 'release' || inputs.publish_npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Trusted Publishing (OIDC): do not set registry-url. That writes an empty
      # _authToken into .npmrc and can produce incomplete provenance attestations
      # that make npmjs.com show "Failed to fetch provenance details".
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Publish to npm
        run: |
          npm --version
          # Clear any inherited classic-token hint so npm uses OIDC.
          unset NODE_AUTH_TOKEN NPM_TOKEN
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""

  publish-github:
    needs: verify
    if: github.event_name == 'release' || inputs.publish_github
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: '@hdminh'
          package-manager-cache: false
      - run: npm publish --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
